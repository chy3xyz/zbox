name: CI

on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.3028+a85495ca2
      - run: sudo apt-get install -y busybox-static
      - run: zig build
      - run: zig build test
